version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: intellmeet-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - intellmeet-network
    restart: always

  redis:
    image: redis:alpine
    container_name: intellmeet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - intellmeet-network
    restart: always

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: intellmeet-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/intellmeet
      - JWT_SECRET=supersecretkey_change_this_in_production
      - JWT_EXPIRE=15m
      - JWT_REFRESH_SECRET=supersecretrefreshkey_change_this_in_production
      - JWT_REFRESH_EXPIRE=7d
      - CLIENT_URL=http://localhost:8080
    depends_on:
      - mongodb
      - redis
    networks:
      - intellmeet-network
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: intellmeet-client
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - intellmeet-network
    restart: always

networks:
  intellmeet-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
