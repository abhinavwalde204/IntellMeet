apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
  labels:
    app: intellmeet
    component: client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intellmeet
      component: client
  template:
    metadata:
      labels:
        app: intellmeet
        component: client
    spec:
      containers:
        - name: client
          image: intellmeet-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: client-service
  labels:
    app: intellmeet
    component: client
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: intellmeet
    component: client
  type: LoadBalancer
