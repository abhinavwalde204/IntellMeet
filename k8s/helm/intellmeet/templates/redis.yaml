apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redis
  labels:
    app: {{ .Chart.Name }}
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
      component: redis
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        component: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.redis.repository }}:{{ .Values.image.redis.tag }}"
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
  labels:
    app: {{ .Chart.Name }}
    component: redis
spec:
  ports:
    - port: {{ .Values.service.redis.port }}
      targetPort: 6379
  selector:
    app: {{ .Chart.Name }}
    component: redis
