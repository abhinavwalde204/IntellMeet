apiVersion: v1
kind: ConfigMap
metadata:
  name: intellmeet-config
  labels:
    app: intellmeet
data:
  PORT: "5000"
  MONGO_URI: "mongodb://mongodb-service:27017/intellmeet"
  REDIS_URL: "redis://redis-service:6379"
  CLIENT_URL: "http://intellmeet-client"
  NODE_ENV: "production"

---
